{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Servizi</h2>
    <a href="{{ url_for('servizio_nuovo') }}" class="btn btn-primary">+ Nuovo servizio</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>Asset collegati</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for s in servizi %}
                <tr>
                    <td>{{ s.nome }}</td>
                    <td>{{ s.descrizione }}</td>
                    <td>{{ s.num_asset }}</td>
                    <td class="text-end">
                        <a href="{{ url_for('servizio_modifica', id_servizio=s.id_servizio) }}"
                           class="btn btn-sm btn-outline-secondary">Modifica</a>
                        <form method="post" action="{{ url_for('servizio_elimina', id_servizio=s.id_servizio) }}"
                              class="d-inline" onsubmit="return confirm('Eliminare questo servizio?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Elimina</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted py-4">Nessun servizio presente.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
